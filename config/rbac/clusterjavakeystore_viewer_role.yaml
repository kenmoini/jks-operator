# This rule is not used by the project jks-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to jks.kemo.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: jks-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterjavakeystore-viewer-role
rules:
- apiGroups:
  - jks.kemo.dev
  resources:
  - clusterjavakeystores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - jks.kemo.dev
  resources:
  - clusterjavakeystores/status
  verbs:
  - get

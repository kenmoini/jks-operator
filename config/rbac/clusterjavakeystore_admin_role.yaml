# This rule is not used by the project jks-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over jks.kemo.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: jks-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterjavakeystore-admin-role
rules:
- apiGroups:
  - jks.kemo.dev
  resources:
  - clusterjavakeystores
  verbs:
  - '*'
- apiGroups:
  - jks.kemo.dev
  resources:
  - clusterjavakeystores/status
  verbs:
  - get

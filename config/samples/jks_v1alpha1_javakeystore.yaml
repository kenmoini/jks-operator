---
# Example: a Java Keystore that bundles a CA certificate from a ConfigMap and the
# leaf TLS keypair from a kubernetes.io/tls Secret. Both sources must live in the
# same namespace as the JavaKeystore CR — NamespacedConfigMapReference and
# NamespacedSecretReference do not carry namespace fields.
#
# Replace the PEM data below with your own CA bundle and provide a real
# kubernetes.io/tls Secret named `javakeystore-sample-tls` (or change the
# tlsCertSecretRef name) before applying.
apiVersion: v1
kind: ConfigMap
metadata:
  name: javakeystore-sample-ca
data:

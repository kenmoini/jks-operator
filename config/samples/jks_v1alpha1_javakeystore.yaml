apiVersion: v1
data:
  tls.crt: 
  tls.key: 
kind: Secret
metadata:
  creationTimestamp: null
  name: javakeystore-sample-tls
type: kubernetes.io/tls
---
apiVersion: jks.kemo.dev/v1alpha1
kind: JavaKeystore
metadata:
  labels:
    app.kubernetes.io/name: jks-operator
    app.kubernetes.io/managed-by: kustomize
  name: javakeystore-sample
spec:
  rootCAConfigMaps:
    - name: javakeystore-sample-ca
      key: ca.crt
  # tlsCertSecretRef is optional — uncomment after creating a real
  # kubernetes.io/tls Secret named "javakeystore-sample-tls" in the
  # `default` namespace, e.g. via:
  #   kubectl create secret tls javakeystore-sample-tls \
  #     --cert=/path/to/tls.crt --key=/path/to/tls.key
  tlsCertSecretRef:
    - name: javakeystore-sample-tls

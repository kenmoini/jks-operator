---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: clusterjavakeystores.jks.kemo.dev
spec:
  group: jks.kemo.dev
  names:
    kind: ClusterJavaKeystore
    listKind: ClusterJavaKeystoreList
    plural: clusterjavakeystores
    singular: clusterjavakeystore
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterJavaKeystore is a cluster-scoped resource that defines
          the desired state and observed state of a Java Keystore that is generated
          from a set of Root CA certificates and an optional TLS certificate. The
          generated Java Keystore is stored in a ConfigMap and the password for the
          Java Keystore is stored in a Secret. Namespaces can reference this ClusterJavaKeystore
          to use the generated Java Keystore.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterJavaKeystoreSpec defines the desired state of ClusterJavaKeystore.
            properties:
              addDefaultCACertificates:
                description: AddDefaultCACertificates indicates whether to include
                  the default CA certificates in the Java Keystore.  Defaults to false.
                type: boolean
              defaultCACertificatesPath:
                description: DefaultCACertificatesPath is the path to the default
                  CA certificates file - in the UBI container it is at /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem.
                  This field is optionally and typically only used when the controller
                  is running in a non-UBI container or externally.
                type: string
              keyStorePasswordSecretRef:
                description: KeystorePasswordSecretRef is a reference to a Secret
                  that contains the password for the Java Keystore. This field is
                  optional and if omitted will use the default password "changeit".
                properties:
                  key:
                    description: Key in the Secret that contains the password.  If
                      left absent, the key "password" will be used by default.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                  namespace:
                    description: Namespace of the Secret.
                    type: string
                required:
                - name
                - namespace
                type: object
              namespaceSelector:
                description: NamespaceSelector is a selector for the namespaces that
                  are allowed to reference this ClusterJavaKeystore. If left absent,
                  all namespaces will be allowed to reference this ClusterJavaKeystore.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              rootCAConfigMaps:
                description: RootCAConfigMaps is a list of ConfigMaps that contain
                  Root CA Certificates.
                items:
                  description: ConfigMapReference defines a reference to a ConfigMap
                    that contains a Certificate.
                  properties:
                    key:
                      description: Key in the ConfigMap that contains the Certificate.  If
                        left absent, all the keys in the ConfigMap will be used that
                        match a PEM encoded certificate.
                      type: string
                    name:
                      description: Name of the ConfigMap.
                      type: string
                    namespace:
                      description: Namespace of the ConfigMap.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
              systemNamespace:
                description: SystemNamespace is the namespace the operator is running
                  in and where the Java Keystore ConfigMap and Secret will be created.  If
                  left absent, it will default to "jks-operator".
                type: string
            type: object
          status:
            description: ClusterJavaKeystoreStatus defines the observed state of ClusterJavaKeystore.
            properties:
              conditions:
                description: Conditions represents the latest available observations
                  of the ClusterJavaKeystore's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: ErrorMessage contains any error message related to the
                  generation of the Java Keystore.
                type: string
              generated:
                description: Generated is a boolean that indicates whether the Java
                  Keystore has been generated successfully.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: javakeystores.jks.kemo.dev
spec:
  group: jks.kemo.dev
  names:
    kind: JavaKeystore
    listKind: JavaKeystoreList
    plural: javakeystores
    singular: javakeystore
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: JavaKeystore is the Schema for the javakeystores API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: JavaKeystoreSpec defines the desired state of JavaKeystore.
            properties:
              addDefaultCACertificates:
                description: AddDefaultCACertificates indicates whether to include
                  the default CA certificates in the Java Keystore.  Defaults to false.
                type: boolean
              defaultCACertificatesPath:
                description: DefaultCACertificatesPath is the path to the default
                  CA certificates file - in the UBI container it is at /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem.
                  This field is optionally and typically only used when the controller
                  is running in a non-UBI container or externally.
                type: string
              keyStorePasswordSecretRef:
                description: KeystorePasswordSecretRef is a reference to a Secret
                  that contains the password for the Java Keystore. This field is
                  optional and if omitted will use the default password "changeit".
                properties:
                  key:
                    description: |-
                      Key in the Secret that contains the password.
                      If left absent, the key "password" will be used by default.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
              rootCAConfigMaps:
                description: RootCAConfigMaps is a list of ConfigMaps that contain
                  Root CA Certificates.
                items:
                  description: |-
                    ConfigMapReference defines a reference to a ConfigMap that contains a Certificate.
                    Must be in the same namespace as the JavaKeystore.
                  properties:
                    key:
                      description: |-
                        Key in the ConfigMap that contains the Certificate.
                        If left absent, all the keys in the ConfigMap will be used that match a PEM encoded certificate.
                      type: string
                    name:
                      description: Name of the ConfigMap.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              targetConfigMap:
                description: TargetConfigMap is a reference to the ConfigMap where
                  the generated Java Keystore will be stored. The ConfigMap will be
                  created in the same namespace as the JavaKeystore. This field is
                  optional and if omitted, a default name of "<java-keystore-name>-keystore"
                  will be used.
                properties:
                  key:
                    description: |-
                      Key in the ConfigMap that contains the Certificate.
                      If left absent, all the keys in the ConfigMap will be used that match a PEM encoded certificate.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    type: string
                required:
                - name
                type: object
              targetSecret:
                description: TargetSecret is a reference to the Secret where the password
                  for the Java Keystore will be stored. The Secret will be created
                  in the same namespace as the JavaKeystore. This field is optional
                  and if omitted, a default name of "<java-keystore-name>-password"
                  will be used.
                properties:
                  key:
                    description: |-
                      Key in the Secret that contains the password.
                      If left absent, the key "password" will be used by default.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
              tlsCertSecretRef:
                description: TLSCertSecretRef is a reference to a list of Secrets
                  that contain a TLS certificate and private key to be included in
                  the Java Keystore. This field is optional and if omitted, no TLS
                  certificate will be included in the Java Keystore.
                items:
                  description: |-
                    SecretReference defines a reference to a Secret that contains the password for the Java Keystore or TLS Secret to include in the Java Keystore.
                    Must be in the same namespace as the JavaKeystore.
                  properties:
                    key:
                      description: |-
                        Key in the Secret that contains the password.
                        If left absent, the key "password" will be used by default.
                      type: string
                    name:
                      description: Name of the Secret.
                      type: string
                  required:
                  - name
                  type: object
                type: array
            type: object
          status:
            description: JavaKeystoreStatus defines the observed state of JavaKeystore.
            properties:
              conditions:
                description: Conditions represents the latest available observations
                  of the ClusterJavaKeystore's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: ErrorMessage contains any error message related to the
                  generation of the Java Keystore.
                type: string
              generated:
                description: Generated is a boolean that indicates whether the Java
                  Keystore has been generated successfully.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
